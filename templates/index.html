<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Site Media Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6">

    <div class="max-w-xl w-full bg-white rounded-3xl shadow-xl border border-slate-100 p-8">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Media Downloader</h1>
            <p class="text-slate-500 mt-2">Download clips or full media from YouTube, Insta, & FB</p>
        </div>

        <form action="/download" method="post" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Video or Social Media URL</label>
                <input type="url" name="url" required placeholder="https://..." 
                       class="w-full px-4 py-4 rounded-2xl bg-slate-50 border border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-100 outline-none transition-all">
            </div>

            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Download As</label>
                    <select name="format" class="w-full px-4 py-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:border-blue-500 transition-all">
                        <option value="mp3">MP3 (Audio)</option>
                        <option value="mp4">MP4 (Video)</option>
                    </select>
                </div>

                <div class="flex flex-col justify-end">
                    <span class="text-xs text-slate-400 mb-1 italic">Leave blank for full length</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-6 p-4 bg-blue-50 rounded-2xl border border-blue-100">
                <div>
                    <label class="block text-xs font-bold text-blue-700 uppercase tracking-wider mb-2">Start (hh:mm:ss)</label>
                    <input type="text" name="startTime" placeholder="00:00:00" 
                           class="w-full px-3 py-2 rounded-lg border-none focus:ring-2 focus:ring-blue-400 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-blue-700 uppercase tracking-wider mb-2">End (hh:mm:ss)</label>
                    <input type="text" name="endTime" placeholder="00:01:30" 
                           class="w-full px-3 py-2 rounded-lg border-none focus:ring-2 focus:ring-blue-400 outline-none">
                </div>
            </div>

            <button type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 transform active:scale-[0.98] transition-all">
                Generate Download
            </button>
        </form>

        <p class="text-center text-xs text-slate-400 mt-8">
            Powered by Python & yt-dlp
        </p>
    </div>

</body>
</html>
